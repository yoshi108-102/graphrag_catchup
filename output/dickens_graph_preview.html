 the wife of Fezziwig, described as substantial and full of warmth and matching Fezziwig with her dancing skills.\"\u003cSEP\u003e\"Mrs. Fezziwig is the wife of Mr. Fezziwig, known for her lively spirit and participation in their joyful Christmas celebrations.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"MARLEY\"", "label": "MARLEY", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 2\u003cbr\u003eMarley is Scrooge\u0027s deceased business partner who appears as a ghostly image in the door knocker, creating a supernatural element in the story.\"\u003cSEP\u003e\"Marley is a deceased individual, associated with a ghostly presence that Scrooge encounters. His face is a recurring image in Scrooge\u0027s mind, and he is tied to a spectral event.\"\u003cSEP\u003e\"Marley is mentioned as someone from Scrooge\u0027s past with whom he shared the experience of cold winters, hinting at a connection in Scrooge\u0027s history.\"\u003cSEP\u003e\"Marley was Scrooge\u0027s business partner, now deceased. He is recognized as the former co-owner of Scrooge and Marley, with his name still prominently displayed on the warehouse.", "value": 14.906666666666666}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"FEZZIWIG\"", "label": "FEZZIWIG", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 5\u003cbr\u003eFezziwig is Scrooge\u2019s former employer, remembered fondly by Scrooge for his jovial and benevolent nature.\"\u003cSEP\u003e\"Fezziwig is a cheerful and generous character who hosts a festive dance and is praised by his apprentices for his ability to make others happy.\"\u003cSEP\u003e\"Fezziwig is a jovial and kind-hearted employer, who organizes a Christmas Eve party for his employees and shows agility despite his age.\"\u003cSEP\u003e\"Fezziwig is an individual mentioned in association with a dance, suggesting participation in festive or communal events.", "value": 16.266666666666666}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"OLD SCRATCH\"", "label": "OLD SCRATCH", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 0\u003cbr\u003eOld Scratch is a colloquial reference implying the devil or death, noted in conversation as having claimed someone, likely a wealthy individual.\"\u003cSEP\u003e\"Old Scratch is a colloquial reference to the devil, used here in conversation to imply that someone has gotten what they deserve.", "value": 14.0}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"TIM\"", "label": "TIM", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 0\u003cbr\u003eTim is mentioned in conjunction with someone being his \u0027blood-horse\u0027, suggesting he is cared for or transported with special attention.", "value": 14.0}, {"font": {"color": "#111827"}, "group": "GEO", "id": "\"ST. PAUL\u0027S CHURCHYARD\"", "label": "ST. PAUL\u0027S CHURCHYARD", "shape": "dot", "title": "type: GEO\u003cbr\u003edegree: 0\u003cbr\u003eSt. Paul\u0027s Churchyard is a location mentioned metaphorically as a place where one might take a night stroll, representative of a public or notable area.", "value": 14.0}, {"font": {"color": "#111827"}, "group": "EVENT", "id": "\"STAVE ONE\"", "label": "STAVE ONE", "shape": "dot", "title": "type: EVENT\u003cbr\u003edegree: 0\u003cbr\u003eStave One refers to the first section or part of the story, often used to denote chapters in literary works.", "value": 14.0}, {"font": {"color": "#111827"}, "group": "EVENT", "id": "\"MARLEY\u0027S FUNERAL\"", "label": "MARLEY\u0027S FUNERAL", "shape": "dot", "title": "type: EVENT\u003cbr\u003edegree: 0\u003cbr\u003eMarley\u0027s Funeral is the event marking the death and burial of Marley, reinforcing his death as a significant plot point.", "value": 14.0}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"SCROOGE\u0027S NEPHEW\"", "label": "SCROOGE\u0027S NEPHEW", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 6\u003cbr\u003eScrooge\u002 rast between Scrooge\u0027s disdain for the holiday and societal celebrations.", "value": 14.906666666666666}, {"font": {"color": "#111827"}, "group": "ORGANIZATION", "id": "\"SCROOGE\u0027S COUNTING-HOUSE\"", "label": "SCROOGE\u0027S COUNTING-HOUSE", "shape": "dot", "title": "type: ORGANIZATION\u003cbr\u003edegree: 1\u003cbr\u003eScrooge\u0027s Counting-House is where Scrooge conducts his business, depicted as a frugal and cold workplace that mirrors Scrooge\u0027s personality.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "GEO", "id": "\"FOG\"", "label": "FOG", "shape": "dot", "title": "type: GEO\u003cbr\u003edegree: 1\u003cbr\u003eThe fog is part of the environmental setting, representing the dreary and cold atmosphere of the city and complementing Scrooge\u0027s cold disposition.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"NEPHEW\"", "label": "NEPHEW", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 2\u003cbr\u003eScrooge\u0027s nephew is a character who values Christmas as a time of goodwill and attempts to persuade Scrooge to join in celebrating. He is depicted as kind-hearted and persistent.\"\u003cSEP\u003e\"Scrooge\u0027s nephew is mentioned in a conversation with the Ghost as Fan\u0027s child, creating a connection to his family.", "value": 14.906666666666666}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"CLERK\"", "label": "CLERK", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 1\u003cbr\u003eThe clerk works for Scrooge and is shown to have a warmer disposition despite difficult circumstances, like having a modest income. He inadvertently displays approval of festive sentiments.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"MR. MARLEY\"", "label": "MR. MARLEY", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 1\u003cbr\u003eMr. Marley is Scrooge\u0027s former business partner who has been dead for seven years, remembered as a kindred spirit to Scrooge in business.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"PORTLY GENTLEMEN\"", "label": "PORTLY GENTLEMEN", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 1\u003cbr\u003eThe portly gentlemen are characters who appeal to Scrooge for charity towards the impoverished during the festive season. They are depicted as pleasant and earnest.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "ORGANIZATION", "id": "\"SCROOGE AND MARLEY\u0027S\"", "label": "SCROOGE AND MARLEY\u0027S", "shape": "dot", "title": "type: ORGANIZATION\u003cbr\u003edegree: 1\u003cbr\u003eScrooge and Marley\u0027s is the business firm formerly run by Scrooge and Marley, suggesting an established enterprise where Scrooge still works as the surviving partner.\"\u003cSEP\u003e\"Scrooge and Marley\u0027s is the counting-house formerly run by Scrooge, indicating his status as a businessman.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "EVENT", "id": "\"CHRISTMAS\"", "label": "CHRISTMAS", "shape": "dot", "title": "type: EVENT\u003cbr\u003edegree: 4\u003cbr\u003eChristmas is a recurring event in the text, serving as both an occasion for celebration and a source of contention between characters. It is depicted as a time for reflection, goodwill, and charitable actions.\"\u003cSEP\u003e\"Christmas is an event that appears frequently in Scrooge\u0027s memories, particularly linked to themes of joy, neglect, and the contrast of past and present feelings.\"\u003cSEP\u003e\"Christmas is celebrated as a joyful and festive occasion, with decorations and family gatherings.\"\u003cSEP\u003e\"Christmas is portrayed as a significant time of reflection and memory for Scrooge, evoking feelings of regret, sadness, and nostalgia.\"\u003cSEP\u003e\"Christmas is the backdrop of the story, a festive time that elicits memories and reflections for Scrooge.\"\u003cSEP\u003e\"Christmas is the central festive event during which the characters gather for celebration and games, fostering communal joy and reflection.\"\u003cSEP\u003e\"Christmas is the central holiday being celebrated, representing warmth, generosity, and the spirit of giving that contrasts with Scrooge\u2019s initial demeanor.\"\u003cSEP\u003e\"Christmas is the festive season during which the narrative takes place, highlighting themes of charity, celebration, and introspection.\"\u003cSEP\u003e\"Christmas serves as the backdrop for the joyful family gathering and gift-giving scene.", "value": 15.813333333333333}, {"font": {"color": "#111827"}, "group": "GEO", "id": "\"BEDLAM\"", "label": "BEDLAM", "shape": "dot", "title": "type: GEO\u003cbr\u003edegree: 0\u003cbr\u003eBedlam is referenced by Scrooge in a figurative sense to express frustration, referring to a historical institution known for housing the mentally ill, representing a place of chaos or madness.", "value": 14.0}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"THE GENTLEMAN\"", "label": "THE GENTLEMAN", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 1\u003cbr\u003eThe Gentleman interacts with Scrooge, attempting to collect donations for the poor, highlighting the charitable efforts during Christmas.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "ORGANIZATION", "id": "\"UNION WORKHOUSES\"", "label": "UNION WORKHOUSES", "shape": "dot", "title": "type: ORGANIZATION\u003cbr\u003edegree: 1\u003cbr\u003eUnion Workhouses were institutions in Victorian England meant to provide shelter and work for the poor, often criticized for their harsh conditions.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "EVENT", "id": "\"THE TREADMILL AND THE POOR LAW\"", "label": "THE TREADMILL AND THE POOR LAW", "shape": "dot", "title": "type: EVENT\u003cbr\u003edegree: 1\u003cbr\u003eThe Treadmill and The Poor Law refer to measures in place in Victorian ists of Bob Cratchit, Mrs. Cratchit, Tiny Tim, Martha, Peter, and the young Cratchits, who are portrayed celebrating Christmas.", "value": 14.0}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"TINY TIM\"", "label": "TINY TIM", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 6\u003cbr\u003eTiny Tim is Bob Cratchit\u0027s son, mentioned by Scrooge when comparing the turkey\u0027s size, indicative of Scrooge\u0027s newfound generosity.\"\u003cSEP\u003e\"Tiny Tim is Bob Cratchit\u0027s son, who, due to Scrooge\u0027s newfound generosity, survives and is cherished as if by a second father.\"\u003cSEP\u003e\"Tiny Tim is Bob Cratchit\u0027s son, whose health and spirit are central to his family\u0027s concern and whose memory evokes emotion in the narrative.\"\u003cSEP\u003e\"Tiny Tim is Bob\u0027s son, a frail child whose health is a concern for the family. His positive spirit is evident as he echoes the Christmas blessings.\"\u003cSEP\u003e\"Tiny Tim is a beloved child in the Cratchit family, remembered for his patience, mildness, and lightness.\"\u003cSEP\u003e\"Tiny Tim is mentioned in reference to the size of the turkey, indicating he is a child associated with Bob.\"\u003cSEP\u003e\"Tiny Tim is referred to as a source of patience and mildness, whose spirit has a lasting impact on the Cratchit family.\"\u003cSEP\u003e\"Tiny Tim is the youngest child in the Cratchit family, who is physically disabled but possesses a warm spirit.\"\u003cSEP\u003e\"Tiny Tim is the youngest of the Cratchit children, who sings a song with a plaintive voice and seems indifferent to the toast to Scrooge.", "value": 16.72}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"YOUNG CRATCHITS\"", "label": "YOUNG CRATCHITS", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 0\u003cbr\u003eThe Young Cratchits refer to the younger children in the Cratchit family who are actively involved in the Christmas Day celebrations.", "value": 14.0}, {"font": {"color" ilar opinion about Scrooge with other women in the group.", "value": 15.36}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"TOPPER\"", "label": "TOPPER", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 4\u003cbr\u003eTopper is a character who is skilled in music, particularly deeply capable in bass singing, and engages playfully in social games.\"\u003cSEP\u003e\"Topper is a friend of Scrooge\u0027s nephew and niece, known for his jovial nature and musical talent in contributing to the family\u0027s festivities.\"\u003cSEP\u003e\"Topper is a guest at Fred\u0027s Christmas dinner, who shares in the festive celebration.", "value": 15.813333333333333}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"SCROOGE\u0027S NIECE\u0027S SISTER\"", "label": "SCROOGE\u0027S NIECE\u0027S SISTER", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 1\u003cbr\u003eScrooge\u0027s niece\u0027s sister is depicted as one of the guests, notable for blushing during a discussion about bachelors and marriage.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"PLUMP SISTER\"", "label": "PLUMP SISTER", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 1\u003cbr\u003eThe Plump Sister is a participant during the games who becomes the focus of Topper\u0027s attention during a playful episode of blind man\u0027s-buff.\"\u003cSEP\u003e\"The plump sister is another guest at Fred\u0027s Christmas gathering, participating in the festivities.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "EVENT", "id": "\"BLIND MAN\u0027S BUFF\"", "label": "BLIND MAN\u0027S BUFF", "shape": "dot", "title": "type: EVENT\u003cbr\u003edegree: 2\u003cbr\u003eBlind Man\u0027s Buff is a game played at the Christmas gathering, characterized by playful chases and social interaction.", "value": 14.906666666666666}, {"font": {"color": "#111827"}, "group": "EVENT", "id": "\"FORFEITS\"", "label": "FORFEITS", "shape": "dot", "title": "type: EVENT\u003cbr\u003edegree: 1\u003cbr\u003eForfeits is a game played at the Christmas celebration, involving tasks and penalties, encouraging lighthearted fun among participants.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "EVENT", "id": "\"YES AND NO\"", "label": "YES AND NO", "shape": "dot", "title": "type: EVENT\u003cbr\u003edegree: 1\u003cbr\u003eYes and No is a game led by Scrooge\u0027s nephew where participants ask questions to guess an entity, highlighting creativity and communication.", "value": 14.453333333333333}, {"font": {"color": "#111827"}, "group": "GEO", "id": "\"LONDON\"", "label": "LONDON", "shape": "dot", "title": "type: GEO\u003cbr\u003edegree: 0\u003cbr\u003eLondon is described as the setting where the live, disagreeable animal roams, providing the context for the game Yes and No.\"\u003cSEP\u003e\"London is mentioned as the city where the narrative is set, and it is where Scrooge is noted to roam without confinement.", "value": 14.0}, {"font": {"color": "#111827"}, "group": "GEO", "id": "\"SCROOGE\u0027S BOARDING SCHOOL\"", "label": "SCROOGE\u0027S BOARDING SCHOOL", "shape": "dot", "title": "type: GEO\u003cbr\u003edegree: 0\u003cbr\u003eScrooge\u0027s Boarding School is referenced as a place from Scrooge\u0027s past, evoking childhood memories through music.", "value": 14.0}, {"font": {"color": "#111827"}, "group": "EVENT", "id": "\"TWELFTH-NIGHT PARTY\"", "label": "TWELFTH-NIGHT PARTY", "shape": "dot", "title": "type: EVENT\u003cbr\u003edegree: 2\u003cbr\u003eThe Twelfth-Night party is an event Scrooge and the Ghost visit, marking a point during their journey.", "value": 14.906666666666666}, {"font": {"color": "#111827"}, "group": "PERSON", "id": "\"IGNORANCE\"", "label": "IGNORANCE", "shape": "dot", "title": "type: PERSON\u003cbr\u003edegree: 0\u003cbr\u003eIgnorance is personified as a boy, symbolizing lack of knowledge or awareness and the potential for negative outcomes.\"\u003cSEP\u003
