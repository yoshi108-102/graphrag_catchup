<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leiden法 動的解説</title>
  <style>
    :root {
      --bg-top: #f5efe3;
      --bg-bottom: #d7e8de;
      --ink: #1f2a2e;
      --muted: #41595b;
      --panel: rgba(255, 255, 255, 0.82);
      --accent: #cb5d2e;
      --accent-2: #1f7a8c;
      --good: #2d8f56;
      --warn: #996d1a;
      --bad: #b03c29;
      --line: #678388;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "BIZ UDPGothic", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 20%, rgba(203, 93, 46, 0.18) 0%, rgba(203, 93, 46, 0) 40%),
        radial-gradient(circle at 88% 80%, rgba(31, 122, 140, 0.2) 0%, rgba(31, 122, 140, 0) 45%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(1100px, 100%);
      display: grid;
      gap: 16px;
      grid-template-columns: 1.15fr 1fr;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(31, 42, 46, 0.12);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(31, 42, 46, 0.12);
      backdrop-filter: blur(4px);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(31, 42, 46, 0.1);
      background: linear-gradient(90deg, rgba(203, 93, 46, 0.12), rgba(31, 122, 140, 0.12));
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 1rem + 1vw, 1.8rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .viz-wrap {
      padding: 8px 16px 16px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.75);
    }

    .controls {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font: inherit;
      cursor: pointer;
      background: var(--accent-2);
      color: #fff;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button.secondary {
      background: #40595f;
    }

    button.ghost {
      background: rgba(64, 89, 95, 0.15);
      color: var(--ink);
      border: 1px solid rgba(64, 89, 95, 0.32);
    }

    .gamma-wrap {
      width: 100%;
      display: grid;
      gap: 6px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .gamma-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .explain {
      padding: 16px 18px;
      display: grid;
      gap: 12px;
    }

    .status {
      display: flex;
      gap: 12px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .status strong {
      color: var(--accent);
    }

    .desc {
      line-height: 1.7;
      font-size: 0.96rem;
    }

    .score {
      padding: 12px;
      border-radius: 10px;
      background: rgba(31, 42, 46, 0.06);
      font-size: 0.9rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.85rem;
    }

    th,
    td {
      border-bottom: 1px dashed rgba(31, 42, 46, 0.2);
      padding: 6px 4px;
      text-align: left;
    }

    .best {
      color: var(--good);
      font-weight: 700;
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    @media (max-width: 860px) {
      .shell {
        grid-template-columns: 1fr;
      }

      body {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card" aria-labelledby="viz-title">
      <header class="card-header">
        <h1 id="viz-title">Leiden法を動かして理解する</h1>
        <p class="subtitle">小さな重み付きグラフを使って、局所移動・精緻化・集約の流れを可視化します。</p>
      </header>
      <div class="viz-wrap">
        <svg id="graph" viewBox="0 0 640 420" role="img" aria-label="Leiden法のコミュニティ分割図"></svg>
        <div class="controls">
          <div class="row">
            <button id="prev" class="ghost" type="button">前のステップ</button>
            <button id="next" type="button">次のステップ</button>
            <button id="play" class="secondary" type="button">自動再生</button>
            <button id="reset" class="ghost" type="button">リセット</button>
          </div>
          <div class="gamma-wrap">
            <label for="gamma">解像度パラメータ γ: <strong id="gammaValue">1.00</strong></label>
            <input id="gamma" type="range" min="0.5" max="2.0" step="0.05" value="1.0">
            <div class="gamma-labels"><span>粗いクラスタ</span><span>細かいクラスタ</span></div>
          </div>
        </div>
      </div>
    </section>

    <section class="card" aria-live="polite">
      <header class="card-header">
        <h1>説明テキスト</h1>
        <p class="subtitle">ステップとγに応じて説明が変わります。</p>
      </header>
      <div class="explain">
        <div class="status">
          <span>現在: <strong id="stepName">初期化</strong></span>
          <span>候補分割の最良 CPM スコア: <strong id="bestScore">-</strong></span>
        </div>
        <div class="desc" id="description"></div>
        <div class="score">
          評価式（簡易版）: <code>Q = Σc (内部辺重み e_c - γ * n_c(n_c-1)/2)</code>
          <table>
            <thead>
              <tr><th>候補</th><th>コミュニティ例</th><th>Q(γ)</th></tr>
            </thead>
            <tbody id="scoreBody"></tbody>
          </table>
        </div>
        <div class="legend">
          <span><i class="dot" style="background:#f08a5d"></i>Community A</span>
          <span><i class="dot" style="background:#4aa3a1"></i>Community B</span>
          <span><i class="dot" style="background:#d2a84c"></i>Community C</span>
        </div>
      </div>
    </section>
  </main>

  <script src="./leiden_explainer.js"></script>
</body>
</html>
